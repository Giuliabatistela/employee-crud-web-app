<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Empregados</title>
    <link href="styles.css" rel="stylesheet" />
</head>
<body>
    <div class="topnav" id="myTopnav">
        <a href="dashboard.html">Página Inicial</a>
        <a href="employee.html">Funcionários</a>
        <a href="sobre.html">Sobre Nós</a>
        <a href="comentarios.html">Comentários</a>
        <a href="logout.html">Sair</a>
        <a href="javascript:void(0);" class="icon" onclick="menu()">
            <i class="fa fa-bars"></i>
        </a>
    </div>

    <div class="geral">
        <h2>Employees</h2>
        <table id="employeesTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
        <h2>Add Employees</h2>
        <form id="addEmployeeForm">
            <label for="name">Name: </label>
            <input type="text" id="name" required />

            <label for="Position">Department: </label>
            <input type="text" id="position" required />


            <label for="Salary">Salary: </label>
            <input type="number" id="salary" required />

            <button type="submit">Add</button>
        </form>

        <h2>Update Employee</h2>
        <form id="updateEmployeeForm">
            <label for="updateId">Employee ID: </label>
            <input type="number" id="updateId" required />

            <label for="updateName">Name: </label>
            <input type="text" id="updateName" required />

            <label for="updatePosition">Department: </label>
            <input type="text" id="updatePosition" required />


            <label for="Salary">Salary: </label>
            <input type="number" id="updateSalary" step="0.01" required />

            <button type="submit">Update</button>
        </form>

        <h2>Delete Employee</h2>
        <form id="deleteEmployeeForm">
            <label for="deleteId">Employee ID: </label>
            <input type="number" id="deleteId" required />

            <button type="submit">Delete</button>
        </form>
    </div>


</body>
</html>

<script>
    function getEmployees() {
        fetch('https://localhost:7200/employee')
            .then(response => response.json())
            .then(data => {
                const employeesTable = document.getElementById('employeesTable');
                const tbody = employeesTable.querySelector('tbody');
                tbody.innerHTML = '';


                data.forEach(employee => {
                    const row = document.createElement('tr');

                    const idCell = document.createElement('td');
                    idCell.textContent = employee.id;
                    row.appendChild(idCell);

                    const nameCell = document.createElement('td');
                    nameCell.textContent = employee.name;
                    row.appendChild(nameCell);

                    const positionCell = document.createElement('td');
                    positionCell.textContent = employee.position;
                    row.appendChild(positionCell);

                    const salaryCell = document.createElement('td');
                    salaryCell.textContent = employee.salary;
                    row.appendChild(salaryCell);

                    const actionsCell = document.createElement('td');
                    const deleteButton = document.createElement('button');
                    deleteButton.textContent = 'Delete';
                    deleteButton.addEventListener('click', () => deleteEmployee(employee.id));
                    actionsCell.appendChild(deleteButton);
                    row.appendChild(actionsCell);

                    tbody.appendChild(row);
                });
            });
    }

    function addEmployee(event) {
        event.preventDefault();

        const name = document.getElementById('name').value;
        const position = document.getElementById('position').value;
        const salary = parseFloat(document.getElementById('salary').value);

        const newEmployee = {
            Name: name,
            Position: position,
            Salary: salary
        };

        fetch('https://localhost:7200/Employee', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(newEmployee)
        })
            .then(response => {
                if (response.ok) {
                    document.getElementById('name').value = '';
                    document.getElementById('position').value = '';
                    document.getElementById('salary').value = '';
                    getEmployees();
                }
            });
    }

    function updateEmployee(event) {
        event.preventDefault();

        const id = parseInt(document.getElementById('updateId').value);
        const name = document.getElementById('updateName').value;
        const position = document.getElementById('updatePosition').value;
        const salary = parseFloat(document.getElementById('updateSalary').value);

        const updateEmployee = {
            Name: name,
            Position: position,
            Salary: salary
        };

        fetch(`https://localhost:7200/employee/${id}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(updateEmployee)
        })
            .then(response => {
                if (response.ok) {
                    document.getElementById('updateId').value = '';
                    document.getElementById('updateName').value = '';
                    document.getElementById('updatePosition').value = '';
                    document.getElementById('updateSalary').value = '';
                    getEmployees();
                }
            });
    }

    function deleteEmployee(id) {
        fetch(`https://localhost:7200/employee/${id}`, {
            method: 'DELETE'
        })
            .then(response => {
                if (response.ok) {
                    getEmployees();
                }
            });
    }

    document.getElementById('addEmployeeForm').addEventListener('submit', addEmployee);
    document.getElementById('updateEmployeeForm').addEventListener('submit', updateEmployee);
    document.getElementById('deleteEmployeeForm').addEventListener('submit', event => {
        event.preventDefault();
        const id = parseInt(document.getElementById('deleteId').value);
        deleteEmployee(id);
    });

    getEmployees();


</script>

<script src="app.js">        </script>
