<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login Page</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <div class="form-box login">
            <form>
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" id="username" placeholder="Usuário" required />
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" id="password" placeholder="Senha" />
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Esqueceu a senha?</a>
                </div>
                <button class="btn" onclick="login()">Entrar</button>
                <p>ou logue por outras plataformas</p>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-github'></i></a>
                    <a href="#"><i class='bx bxl-linkedin'></i></a>
                </div>
            </form>
        </div>
        <div class="form-box register">
            <form>
                <h1>Cadastro</h1>
                <div class="input-box">
                    <input type="text" id="username" placeholder="Usuário" required />
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="text" id="email" placeholder="Email" required />
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" id="password" placeholder="Senha" />
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button class="btn" >Cadastrar</button>
                <p>ou cadastre-se por outras plataformas</p>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-github'></i></a>
                    <a href="#"><i class='bx bxl-linkedin'></i></a>
                </div>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Bem vindo!</h1>
                <p>Não tem uma conta?</p>
                <button class="btn register-btn">Cadrastre-se</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Bem vindo de Volta!</h1>
                <p>Já tem uma conta?</p>
                <button class="btn login-btn">Logar</button>
            </div>
        </div>

    </div>
</body>



</html>
<script src="script.js"></script>
<script>
    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const login = {
            CPF: username,
            Senha: password
        };

        //Enviar os dados de login para o servidor
        fetch('https://localhost:7200/Login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(login)
        })

            .then(response => response.json())
            .then(data => {
                if (data) {
                    localStorage.setItem('authenticated', 'true');
                    window.location.href = 'dashboard.html'; //Redirecionar para a página de dashboard
                } else {
                    // Login falhou, exibir mensagem de erro
                    alert('Login falhou. Verifique suas credenciais e tente novamente.');
                }
            })
            .catch(error => {
                console.error('Erro:', error);
                // alert('Ocorreu um erro ao tentar fazer login. Por favor, tente novamente mais tarde.');
            });
    }
</script>
